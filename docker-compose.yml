version: '3.8'

services:
  test-runner:
    build: .
    container_name: book-tests
    environment:
      - BASE_URL=${BASE_URL:-https://www.litres.ru}
      - HEADLESS=${HEADLESS:-true}
      - BROWSER=${BROWSER:-chromium}
      - VIEWPORT_WIDTH=${VIEWPORT_WIDTH:-1920}
      - VIEWPORT_HEIGHT=${VIEWPORT_HEIGHT:-1080}

      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-test_db}
      - DB_USER=${DB_USER:-test_user}
      - DB_PASSWORD=${DB_PASSWORD:-test_password}

      - API_BASE_URL=${API_BASE_URL:-https://api:8000}
      - API_KEY=${API_KEY:-test_key}
      - API_TIMEOUT=${API_TIMEOUT:-30}

      - RETRY_COUNT=${RETRY_COUNT:-2}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}

    volumes:
      # Монтируем директории для сохранения результатов
      - ./screenshots
      - ./allure-results

      # Монтируем код для разработки (опционально)
      - ./tests
      - ./Pages
      - ./utils
      - ./data

    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started

    networks:
      - test-network

  # Allure сервер для отчетов (опционально)
  allure:
    image: frankescobar/allure-docker-service
    container_name: book-allure
    environment:
      CHECK_RESULTS_EVERY_SECONDS: 5
      KEEP_HISTORY: 1
    ports:
      - "5050:5050"
    volumes:
      - ./allure-results:/app/allure-results
    networks:
      - test-network